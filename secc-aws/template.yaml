AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  secc-aws
  Proyecto serverless para estimación de costos AWS con MCP Server

Globals:
  Function:
    Timeout: 30
    Runtime: python3.11
    Architectures:
      - x86_64

Resources:
  MCPServerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/mcp_server/
      Handler: handler.lambda_handler
      Description: MCP Server que implementa protocolo JSON-RPC 2.0

Outputs:
  MCPServerFunction:
    Description: "MCP Server Lambda Function ARN"
    Value: !GetAtt MCPServerFunction.Arn