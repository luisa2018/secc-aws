AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  secc-aws
  Proyecto serverless para estimacion de costos AWS con MCP Server

Globals:
  Function:
    Runtime: python3.11
    Architectures:
      - x86_64
  Api:
    Cors:
      AllowMethods: "'POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"
    BinaryMediaTypes:
      - application/pdf

Resources:

  MCPServerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/mcp_server/
      Handler: handler.lambda_handler
      Timeout: 30
      Description: MCP Server que implementa protocolo JSON-RPC 2.0
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - pricing:GetProducts
              - pricing:DescribeServices
            Resource: "*"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - POST
          AllowHeaders:
            - "*"

  EstimacionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/estimacion/
      Handler: handler.lambda_handler
      Timeout: 300
      Description: Servicio de Estimacion de costos AWS
      Environment:
        Variables:
          MCP_URL: !Sub "${MCPServerFunctionUrl.FunctionUrl}mcp"
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - bedrock:InvokeModelWithResponseStream
              - bedrock-agentcore:StartCodeInterpreterSession
              - bedrock-agentcore:InvokeCodeInterpreter
              - bedrock-agentcore:StopCodeInterpreterSession
              - lambda:InvokeFunction
              - lambda:InvokeFunctionUrl
              - pricing:GetProducts
              - pricing:DescribeServices
            Resource: "*"
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - POST
          AllowHeaders:
            - "*"

  ReporteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/reporte/
      Handler: handler.lambda_handler
      Timeout: 30
      Description: Servicio de generacion de informes PDF
      Events:
        ReportApi:
          Type: Api
          Properties:
            Path: /report
            Method: post

Outputs:
  EstimacionFunctionUrl:
    Description: "URL directa del endpoint de estimacion"
    Value: !GetAtt EstimacionFunctionUrl.FunctionUrl
  ReporteApi:
    Description: "URL del endpoint POST /report"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/report"
  MCPServerFunctionUrl:
    Description: "URL publica del MCP Server"
    Value: !GetAtt MCPServerFunctionUrl.FunctionUrl
  MCPServerFunction:
    Description: "MCP Server Lambda Function ARN"
    Value: !GetAtt MCPServerFunction.Arn
  EstimacionFunction:
    Description: "Estimacion Lambda Function ARN"
    Value: !GetAtt EstimacionFunction.Arn
  ReporteFunction:
    Description: "Reporte Lambda Function ARN"
    Value: !GetAtt ReporteFunction.Arn