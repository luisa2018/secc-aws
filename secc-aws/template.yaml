AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  secc-aws
  Proyecto serverless para estimación de costos AWS con MCP Server

Globals:
  Function:
    Runtime: python3.11
    Architectures:
      - x86_64
  Api:
    Cors:
      AllowMethods: "'POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin: "'*'"

Resources:

  MCPServerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/mcp_server/
      Handler: handler.lambda_handler
      Timeout: 30
      Description: MCP Server que implementa protocolo JSON-RPC 2.0
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - pricing:GetProducts
              - pricing:DescribeServices
            Resource: "*"

  EstimacionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/estimacion/
      Handler: handler.lambda_handler
      Timeout: 60
      Description: Servicio de Estimación de costos AWS
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - bedrock:InvokeModel
              - lambda:InvokeFunction
            Resource: "*"
      Events:
        EstimateApi:
          Type: Api
          Properties:
            Path: /estimate
            Method: post

Outputs:
  EstimacionApi:
    Description: "URL del endpoint POST /estimate"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/estimate"
  MCPServerFunction:
    Description: "MCP Server Lambda Function ARN"
    Value: !GetAtt MCPServerFunction.Arn
  EstimacionFunction:
    Description: "Estimacion Lambda Function ARN"
    Value: !GetAtt EstimacionFunction.Arn